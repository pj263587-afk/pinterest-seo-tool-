<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PinBoost 🚀 - Pinterest SEO + Resizer Tool</title>
<meta name="description" content="Resize images to 1000x1500 for Pinterest instantly in browser. Generate SEO titles, descriptions, alt text and keywords for free. No signup required.">
<meta name="keywords" content="pinterest image resizer, 1000x1500 resizer, pinterest seo tool, pin title generator, free pinterest tool">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Poppins', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding: 20px; min-height: 100vh; display: flex; align-items: center; }
.container { max-width: 500px; margin: 50px auto; background: white; border-radius: 20px; padding: 40px 30px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); width: 100%; }
h1 { color: #E60023; text-align: center; margin-bottom: 10px; font-size: 28px; font-weight: 700; }
.subtitle { text-align: center; color: #666; margin-bottom: 25px; font-size: 14px; }
input, button { width: 100%; padding: 14px 16px; margin: 10px 0; border: 2px solid #ddd; border-radius: 10px; font-size: 16px; font-family: 'Poppins', sans-serif; }
input:focus { border-color: #E60023; outline: none; }
button { background: #E60023; color: white; border: none; cursor: pointer; font-weight: 600; transition: 0.3s; font-size: 16px; }
button:hover { background: #c4001e; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(230,0,35,0.3); }
.result-box { background: #f8f9ff; padding: 20px; margin-top: 20px; border-radius: 12px; border-left: 5px solid #E60023; text-align: left; }
canvas { max-width: 100%; border: 3px dashed #ddd; margin: 15px 0; border-radius: 12px; display: block; }
label { font-weight: 600; color: #333; display: block; margin-top: 25px; margin-bottom: 8px; font-size: 15px; }
small { color: #666; font-size: 13px; }
.copy-btn { background: #28a745!important; margin-top: 15px; font-size: 14px; padding: 10px; }
.copy-btn:hover { background: #218838!important; transform: translateY(-2px); }
.char-count { font-size: 13px; color: #888; text-align: right; margin-top: 5px; }
</style>
</head>
<body>
<div class="container">
    <h1>📌 PinBoost 🚀</h1>
    <p class="subtitle">Resize Images to 1000x1500 + Generate SEO for Pins - 100% Free</p>

    <label>1. Upload Image - Auto Resize to 1000x1500px</label>
    <input type="file" id="imageInput" accept="image/*" onchange="resizeImage()">
    <canvas id="canvas"></canvas>
    <button onclick="downloadImage()">Download Resized Image for Pinterest</button>

    <label>2. Enter Your Pin Topic/Keyword</label>
    <input type="text" id="topic" placeholder="e.g. modern kitchen ideas, summer recipes, wedding dresses">
    <button onclick="generateSEO()">Generate SEO Title + Description + Keywords</button>

    <div id="seoResult"></div>

    <!-- Coming Soon Section -->
    <div style="margin-top:35px; padding:25px; background:#fff3cd; border-radius:12px; text-align:center; border:2px solid #ffc107;">
        <b style="font-size:20px; color:#333;">🎁 Free Pinterest SEO Guide PDF</b><br><br>
        <span style="font-size:18px; color:#E60023; font-weight:bold;">Coming Soon...</span><br><br>
        <small>Use the tool now. PDF guide with 100+ pin templates will be added in 1-2 days InshaAllah</small>
    </div>
</div>

<script>
function resizeImage() {
    const file = document.getElementById('imageInput').files[0];
    if(!file) return;

    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    const reader = new FileReader();
    reader.onload = function(e) {
        const img = new Image();
        img.onload = function() {
            canvas.width = 1000;
            canvas.height = 1500;
            ctx.drawImage(img, 0, 0, 1000, 1500);
        }
        img.src = e.target.result;
    }
    reader.readAsDataURL(file);
}

function downloadImage() {
    const canvas = document.getElementById('canvas');
    if(canvas.width === 0) {
        alert('Please upload an image first!');
        return;
    }
    const link = document.createElement('a');
    link.download = 'pinterest-pin-1000x1500.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
}

function generateSEO() {
    const topic = document.getElementById('topic').value.trim();
    if(!topic) {
        alert('Please enter a topic/keyword!');
        return;
    }

    const titles = [
        `10 Stunning ${topic} Ideas You Need to See in 2026`,
        `The Ultimate ${topic} Guide for Beginners`,
        `${topic} Tips and Tricks That Actually Work`,
        `Transform Your Space with These ${topic} Ideas`,
        `Best ${topic} Hacks Nobody Tells You About`
    ];

    const desc = `Save this ${topic} inspiration for later! Discover amazing ${topic} ideas, tips and tutorials for 2026. Perfect for your next project. Click to get more ${topic} inspiration on Pinterest. #${topic.replace(/\s/g,'')} #PinterestInspo #HomeDecor #DIY`;

    const alt = `High quality ${topic} inspiration showing creative ideas, modern designs and practical tips for 2026`;

    const keywords = `${topic}, ${topic} ideas, ${topic} inspiration, ${topic} tips, ${topic} 2026, DIY ${topic}, best ${topic}, ${topic} guide, ${topic} tutorial`;

    document.getElementById('seoResult').innerHTML = `
        <div class="result-box">
            <b>📌 Pin Title:</b><br> ${titles[Math.floor(Math.random()*5)]}<br><br>
            <b>📝 Pin Description:</b><br> ${desc}<br><br>
            <b>🖼️ Alt Text:</b><br> ${alt}<br><br>
            <b>🏷️ Keywords:</b><br> ${keywords}<br><br>
            <button class="copy-btn" onclick="copyText()">Copy Result</button>
            <p class="char-count" id="charCount">Chars: 0/100</p>
            <br><small>Copy and paste this into your Pinterest pin for best SEO results ✅</small>
        </div>
    `;
}

function copyText() {
  let text = document.getElementById('seoResult').innerText;
  navigator.clipboard.writeText(text);
  alert('Copied! ✅ Ab Pinterest me paste karo');
}

document.getElementById('topic').addEventListener('input', function() {
  if(document.getElementById('charCount')) {
    document.getElementById('charCount').innerText = 'Chars: ' + this.value.length + '/100';
  }
});
</script>
</body>
</html>
